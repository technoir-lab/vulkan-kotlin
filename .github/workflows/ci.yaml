name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:
    types: [ checks_requested ]

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}

env:
  VULKAN_SDK_VERSION: 1.4.341.1

jobs:
  build:
    name: Build
    runs-on: macos-26

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: corretto

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          cache-provider: basic

      - name: Cache Kotlin/Native toolchains
        uses: actions/cache@v5.0.5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('settings.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Install Vulkan SDK
        uses: technoir-lab/install-vulkan-sdk@v1.2.3
        with:
          version: ${{ env.VULKAN_SDK_VERSION }}
          cache: true

      - name: Set environment variables
        run: |
          echo "C_INCLUDE_PATH=${{ env.VULKAN_SDK }}/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${{ env.VULKAN_SDK }}/lib" >> "$GITHUB_ENV"

      - name: Build with Gradle
        run: ./gradlew build --scan

  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1.72.0
        with:
          level: warning
          fail_level: warning
